<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="fmcw-api-base" content="http://localhost:8001">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMCW 雷达 · 交互式学习手册</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="wrap">
        <div class="title">📡 FMCW Radar · Interactive Lab</div>
        <div class="subtitle">Frequency-Modulated Continuous Wave 雷达原理 · 公式 · 仿真</div>
        <div class="status-bar">
            <span>计算后端: <span id="backend-status" class="offline">检测中...</span></span>
            <span id="backend-url"></span>
        </div>
        <nav class="tabs" id="tabs">
            <button data-tab="intro" class="active" data-module="modules/intro.html">① 基础原理</button>
            <button data-tab="range" data-module="modules/range.html">② 距离测量</button>
            <button data-tab="velocity" data-module="modules/velocity.html">③ 速度与 2D-FFT</button>
            <button data-tab="angle" data-module="modules/angle.html">④ 角度测量</button>
            <button data-tab="params" data-module="modules/params.html">⑤ 参数设计器</button>
            <button data-tab="sim" data-module="modules/sim.html">⑥ 综合仿真</button>
        </nav>
    </div>
</header>

<main id="main-content">
    <section id="intro" class="active"></section>
    <section id="range"></section>
    <section id="velocity"></section>
    <section id="angle"></section>
    <section id="params"></section>
    <section id="sim"></section>
</main>

<footer>© FMCW Radar Interactive Lab · 仅用于学习理解原理，参数仅作示意</footer>

<script src="js/utils.js"></script>
<script>
const moduleCache = {};
const tabButtons = document.querySelectorAll('#tabs button');

async function loadModule(tabName) {
    const section = document.getElementById(tabName);
    if (moduleCache[tabName]) {
        section.innerHTML = moduleCache[tabName];
        executeModuleScripts(section);
        return;
    }
    
    const btn = document.querySelector(`[data-tab="${tabName}"]`);
    const modulePath = btn ? btn.dataset.module : `modules/${tabName}.html`;
    
    try {
        const response = await fetch(modulePath);
        if (!response.ok) throw new Error('Module not found');
        const html = await response.text();
        moduleCache[tabName] = html;
        section.innerHTML = html;
        executeModuleScripts(section);
    } catch (e) {
        console.error(`Failed to load module: ${tabName}`, e);
        section.innerHTML = `<div class="card"><p class="error">模块加载失败: ${tabName}</p></div>`;
    }
}

function executeModuleScripts(section) {
    const scripts = section.querySelectorAll('script');
    scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        Array.from(oldScript.attributes).forEach(attr => {
            newScript.setAttribute(attr.name, attr.value);
        });
        newScript.textContent = oldScript.textContent;
        oldScript.parentNode.replaceChild(newScript, oldScript);
    });
    
    const tabName = section.id;
    if (typeof renderIntro === 'function' && tabName === 'intro') {
        renderIntro();
        renderBlock();
    }
    if (typeof renderRange === 'function' && tabName === 'range') {
        renderRange();
    }
    if (typeof renderVelocity === 'function' && tabName === 'velocity') {
        renderVelocity();
    }
    if (typeof renderAngle === 'function' && tabName === 'angle') {
        renderAngle();
    }
    if (typeof renderParams === 'function' && tabName === 'params') {
        renderParams();
    }
    if (typeof renderSim === 'function' && tabName === 'sim') {
        renderSim();
    }
}

function renderAll() {
    if (typeof renderIntro === 'function') renderIntro();
    if (typeof renderBlock === 'function') renderBlock();
    if (typeof renderRange === 'function') renderRange();
    if (typeof renderVelocity === 'function') renderVelocity();
    if (typeof renderAngle === 'function') renderAngle();
    if (typeof renderParams === 'function') renderParams();
    if (typeof renderSim === 'function') renderSim();
}

tabButtons.forEach(btn => {
    btn.onclick = async () => {
        tabButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const tabName = btn.dataset.tab;
        document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        
        await loadModule(tabName);
        window.addEventListener('resize', renderAll);
    };
});

checkBackend().then(() => {
    loadModule('intro');
});
</script>

</body>
</html>

<h2>⑥ 综合仿真：多目标场景</h2>
<p>配置多个 (R, v, θ) 目标，查看完整的 <b>距离谱 · Range-Doppler Map · 角度谱</b> 三视图。</p>

<div class="grid">
    <div class="card">
        <h3>雷达配置</h3>
        <div class="controls">
            <div class="ctrl"><label>f<sub>c</sub> (GHz) <b id="x_fc_v">77</b></label>
                <input type="number" id="x_fc" value="77"></div>
            <div class="ctrl"><label>B (GHz) <b id="x_B_v">4</b></label>
                <input type="number" id="x_B" value="4" step="0.1"></div>
            <div class="ctrl"><label>T<sub>c</sub> (μs) <b id="x_Tc_v">40</b></label>
                <input type="number" id="x_Tc" value="40"></div>
            <div class="ctrl"><label>N<sub>chirp</sub> <b id="x_Nc_v">64</b></label>
                <input type="number" id="x_Nc" value="64"></div>
            <div class="ctrl"><label>N<sub>rx</sub> <b id="x_Nrx_v">4</b></label>
                <input type="number" id="x_Nrx" value="4"></div>
            <div class="ctrl"><label>噪声 σ <b id="x_noise_v">0.15</b></label>
                <input type="range" id="x_noise" min="0" max="1" step="0.05" value="0.15"></div>
        </div>
    </div>

    <div class="card">
        <h3>目标列表</h3>
        <div id="simTargets"></div>
        <button class="add" onclick="addSimTarget()">＋ 添加目标</button>
        <div class="warn" style="margin-top:10px">⚠ 简化仿真：忽略 RCS 起伏、相位噪声、IQ 不平衡，仅演示原理。</div>
    </div>
</div>

<div class="grid cols-3" style="margin-top:18px">
    <div class="card">
        <h3>距离谱 <span id="sim-range-loading" class="loading" style="display:none">🔄</span></h3>
        <canvas id="c_sim_r" width="460" height="300"></canvas>
    </div>
    <div class="card">
        <h3>Range-Doppler <span id="sim-rd-loading" class="loading" style="display:none">🔄</span></h3>
        <canvas id="c_sim_rd" width="460" height="300"></canvas>
    </div>
    <div class="card">
        <h3>角度谱 <span id="sim-angle-loading" class="loading" style="display:none">🔄</span></h3>
        <canvas id="c_sim_a" width="460" height="300"></canvas>
    </div>
</div>

<script>
let simTargets = [
    {R:15, v:10, th:-15, amp:1.0},
    {R:35, v:-5, th: 20, amp:0.8},
    {R:55, v: 0, th: 40, amp:0.6}
];
function addSimTarget(){ simTargets.push({R:40,v:0,th:0,amp:0.8}); renderSim(); }
function renderSimTargetInputs(){
    const box=$('simTargets');
    if (!box) return;
    box.innerHTML='';
    simTargets.forEach((tg,i)=>{
        const row=document.createElement('div');
        row.className='target-row';
        row.style.gridTemplateColumns='60px 1fr 1fr 1fr 1fr 40px';
        row.innerHTML=`
            <span style="color:var(--cyan)">T${i+1}</span>
            <label style="font-size:11px;color:var(--muted)">R(m)<input type="number" value="${tg.R}" data-i="${i}" data-k="R"></label>
            <label style="font-size:11px;color:var(--muted)">v(m/s)<input type="number" value="${tg.v}" data-i="${i}" data-k="v" step="1"></label>
            <label style="font-size:11px;color:var(--muted)">θ(°)<input type="number" value="${tg.th}" data-i="${i}" data-k="th" step="5"></label>
            <label style="font-size:11px;color:var(--muted)">amp<input type="number" value="${tg.amp}" data-i="${i}" data-k="amp" step="0.1"></label>
            <button class="del" onclick="simTargets.splice(${i},1);renderSim()">✕</button>`;
        box.appendChild(row);
    });
    box.querySelectorAll('input').forEach(inp=>{
        inp.oninput=()=>{
            simTargets[+inp.dataset.i][inp.dataset.k]=+inp.value;
            renderSim();
        };
    });
}

async function renderSim(){
    renderSimTargetInputs();
    const fc=+$('x_fc').value, B=+$('x_B').value, Tc=+$('x_Tc').value;
    const Nc=+$('x_Nc').value, Nrx=+$('x_Nrx').value, noise=+$('x_noise').value;
    $('x_fc_v').textContent=fc; $('x_B_v').textContent=B;
    $('x_Tc_v').textContent=Tc; $('x_Nc_v').textContent=Nc;
    $('x_Nrx_v').textContent=Nrx; $('x_noise_v').textContent=noise;

    const lam = C/(fc*1e9);
    const S = (B*1e9)/(Tc*1e-6);
    const fs = 20e6;
    const Nfast = 128;
    const Rmax = fs*C*(Tc*1e-6)/(4*B*1e9);
    const vmax = lam/(4*Tc*1e-6);
    const dR = C/(2*B*1e9);
    const dv = lam/(2*Nc*Tc*1e-6);

    showLoading('sim-range-loading'); showLoading('sim-rd-loading'); showLoading('sim-angle-loading');
    try {
        if (backendAvailable) {
            const data = {
                targets: simTargets,
                fc: fc,
                B: B,
                Tc: Tc,
                Nc: Nc,
                Nrx: Nrx,
                noise: noise
            };
            const result = await apiCall('/api/simulation', data);
            renderSimResults_Backend(result, Rmax, vmax, simTargets);
        } else {
            renderSimResults_Fallback(fc, B, Tc, Nc, Nrx, noise, Rmax, vmax, dR, dv, simTargets);
        }
    } catch (e) {
        renderSimResults_Fallback(fc, B, Tc, Nc, Nrx, noise, Rmax, vmax, dR, dv, simTargets);
    }
    hideLoading('sim-range-loading'); hideLoading('sim-rd-loading'); hideLoading('sim-angle-loading');
}

function renderSimResults_Backend(data, Rmax, vmax, targets) {
    const rangeData = data.range_spectrum;
    const rdData = data.range_doppler;
    const angleData = data.angle_spectrum;

    let cv=$('c_sim_r'), {ctx,w,h}=fitCanvas(cv);
    ctx.clearRect(0,0,w,h);
    const pad={l:40,r:14,t:20,b:30};
    drawAxes(ctx,w,h,pad,'R (m)','|R-FFT|');
    const spec=rangeData.magnitudes;
    const mx=Math.max(...spec)||1;
    ctx.strokeStyle='#22d3ee'; ctx.lineWidth=1.6; ctx.beginPath();
    for(let k=0;k<spec.length;k++){
        const R=k*Rmax/spec.length;
        const x=pad.l+(R/Rmax)*(w-pad.l-pad.r);
        const y=h-pad.b - (spec[k]/mx)*(h-pad.t-pad.b)*0.95;
        if(k===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.fillStyle='#8a97c7'; ctx.font='10px sans-serif';
    for(let i=0;i<=4;i++){
        const R=i*Rmax/4, x=pad.l+i*(w-pad.l-pad.r)/4;
        ctx.fillText(R.toFixed(0), x-6, h-pad.b+12);
    }
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
    targets.forEach((tg,i)=>{
        if(tg.R<=Rmax){
            const x=pad.l+(tg.R/Rmax)*(w-pad.l-pad.r);
            ctx.fillText('T'+(i+1), x-4, pad.t+12);
        }
    });

    cv=$('c_sim_rd'); ({ctx,w,h}=fitCanvas(cv));
    ctx.clearRect(0,0,w,h);
    const pad2={l:44,r:14,t:20,b:34};
    drawAxes(ctx,w,h,pad2,'v (m/s)','R (m)');
    const Nx=100, Ny=60;
    const spectrum=rdData.spectrum;
    let maxv=Math.max(...spectrum.flat());
    const img=ctx.createImageData(Nx,Ny);
    for(let yi=0;yi<Ny;yi++){
        for(let xi=0;xi<Nx;xi++){
            const n=Math.pow(spectrum[yi][xi]/maxv,0.55);
            const [r,g,b]=cmap(n);
            img.data[4*(yi*Nx+xi)]=r;
            img.data[4*(yi*Nx+xi)+1]=g;
            img.data[4*(yi*Nx+xi)+2]=b;
            img.data[4*(yi*Nx+xi)+3]=255;
        }
    }
    const off=document.createElement('canvas');
    off.width=Nx; off.height=Ny;
    off.getContext('2d').putImageData(img,0,0);
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(off, pad2.l, pad2.t, w-pad2.l-pad2.r, h-pad2.t-pad2.b);
    ctx.strokeStyle='#253163';
    ctx.strokeRect(pad2.l, pad2.t, w-pad2.l-pad2.r, h-pad2.t-pad2.b);
    ctx.fillStyle='#cdd6f4'; ctx.font='10px sans-serif';
    for(let i=0;i<=4;i++){
        const vv=-vmax+i*vmax/2;
        ctx.fillText(vv.toFixed(0), pad2.l+i*(w-pad2.l-pad2.r)/4-8, h-pad2.b+12);
        const Rg=i*Rmax/4;
        ctx.fillText(Rg.toFixed(0), pad2.l-28, pad2.t+(1-i/4)*(h-pad2.t-pad2.b)+4);
    }

    cv=$('c_sim_a'); ({ctx,w,h}=fitCanvas(cv));
    ctx.clearRect(0,0,w,h);
    const pad3={l:40,r:14,t:20,b:30};
    drawAxes(ctx,w,h,pad3,'θ (°)','|Angle-FFT|');
    const aSpec=angleData.magnitudes;
    const amx=Math.max(...aSpec)||1;
    const grd=ctx.createLinearGradient(0,pad3.t,0,h-pad3.b);
    grd.addColorStop(0,'#a78bfa'); grd.addColorStop(1,'#a78bfa00');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.moveTo(pad3.l, h-pad3.b);
    for(let k=0;k<aSpec.length;k++){
        const x=pad3.l+k/aSpec.length*(w-pad3.l-pad3.r);
        const y=h-pad3.b - (aSpec[k]/amx)*(h-pad3.t-pad3.b)*0.95;
        ctx.lineTo(x,y);
    }
    ctx.lineTo(w-pad3.r, h-pad3.b); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#a78bfa'; ctx.lineWidth=1.4; ctx.beginPath();
    for(let k=0;k<aSpec.length;k++){
        const x=pad3.l+k/aSpec.length*(w-pad3.l-pad3.r);
        const y=h-pad3.b - (aSpec[k]/amx)*(h-pad3.t-pad3.b)*0.95;
        if(k===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.fillStyle='#8a97c7'; ctx.font='10px sans-serif';
    for(let a=-90;a<=90;a+=30){
        const x=pad3.l+(a+90)/180*(w-pad3.l-pad3.r);
        ctx.fillText(a+'°', x-8, h-pad3.b+12);
    }
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
    targets.forEach((tg,i)=>{
        const x=pad3.l+(tg.th+90)/180*(w-pad3.l-pad3.r);
        ctx.fillText('T'+(i+1), x-4, pad3.t+12);
    });
}

function renderSimResults_Fallback(fc, B, Tc, Nc, Nrx, noise, Rmax, vmax, dR, dv, targets) {
    const S = (B*1e9)/(Tc*1e-6);
    const fs = 20e6;
    const Nfast = 128;

    let cv=$('c_sim_r'), {ctx,w,h}=fitCanvas(cv);
    ctx.clearRect(0,0,w,h);
    const pad={l:40,r:14,t:20,b:30};
    drawAxes(ctx,w,h,pad,'R (m)','|R-FFT|');
    const spec=new Float32Array(Nfast/2);
    for(let k=0;k<Nfast/2;k++){
        let re=0,im=0;
        targets.forEach(tg=>{
            const fb = 2*S*tg.R/C;
            const binK = fb * Nfast / fs;
            const delta = k - binK;
            const dir = Math.abs(delta)<1e-6 ? Nfast : Math.sin(Math.PI*delta)/Math.sin(Math.PI*delta/Nfast);
            re += tg.amp * dir * Math.cos(0);
            im += tg.amp * dir * Math.sin(Math.random()*0.3);
        });
        spec[k] = Math.sqrt(re*re+im*im) + noise*Math.random()*Nfast*0.1;
    }
    const mx=Math.max(...spec)||1;
    ctx.strokeStyle='#22d3ee'; ctx.lineWidth=1.6; ctx.beginPath();
    for(let k=0;k<Nfast/2;k++){
        const R=k*Rmax/(Nfast/2);
        const x=pad.l+(R/Rmax)*(w-pad.l-pad.r);
        const y=h-pad.b - (spec[k]/mx)*(h-pad.t-pad.b)*0.95;
        if(k===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.fillStyle='#8a97c7'; ctx.font='10px sans-serif';
    for(let i=0;i<=4;i++){
        const R=i*Rmax/4, x=pad.l+i*(w-pad.l-pad.r)/4;
        ctx.fillText(R.toFixed(0), x-6, h-pad.b+12);
    }
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
    targets.forEach((tg,i)=>{
        if(tg.R<=Rmax){
            const x=pad.l+(tg.R/Rmax)*(w-pad.l-pad.r);
            ctx.fillText('T'+(i+1), x-4, pad.t+12);
        }
    });

    cv=$('c_sim_rd'); ({ctx,w,h}=fitCanvas(cv));
    ctx.clearRect(0,0,w,h);
    const pad2={l:44,r:14,t:20,b:34};
    drawAxes(ctx,w,h,pad2,'v (m/s)','R (m)');
    const Nx=100, Ny=60;
    const img=ctx.createImageData(Nx,Ny);
    const arr=new Float32Array(Nx*Ny); let maxv=0;
    for(let yi=0;yi<Ny;yi++){
        const Rg = yi/Ny*Rmax;
        for(let xi=0;xi<Nx;xi++){
            const vg = (xi/Nx-0.5)*2*vmax;
            let val=0;
            targets.forEach(tg=>{
                const dr=(Rg-tg.R)/dR;
                const dvv=(vg-tg.v)/dv;
                const sr=Math.abs(dr)<1e-6?1:Math.sin(Math.PI*dr)/(Math.PI*dr);
                const sv=Math.abs(dvv)<1e-6?1:Math.sin(Math.PI*dvv)/(Math.PI*dvv);
                val += tg.amp*tg.amp*sr*sr*sv*sv;
            });
            val += noise*noise*Math.random()*0.2;
            arr[yi*Nx+xi]=val; if(val>maxv) maxv=val;
        }
    }
    for(let i=0;i<arr.length;i++){
        const n=Math.pow(arr[i]/maxv,0.55);
        const [r,g,b]=cmap(n);
        img.data[4*i]=r; img.data[4*i+1]=g; img.data[4*i+2]=b; img.data[4*i+3]=255;
    }
    const off=document.createElement('canvas');
    off.width=Nx; off.height=Ny;
    off.getContext('2d').putImageData(img,0,0);
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(off, pad2.l, pad2.t, w-pad2.l-pad2.r, h-pad2.t-pad2.b);
    ctx.strokeStyle='#253163';
    ctx.strokeRect(pad2.l, pad2.t, w-pad2.l-pad2.r, h-pad2.t-pad2.b);
    ctx.fillStyle='#cdd6f4'; ctx.font='10px sans-serif';
    for(let i=0;i<=4;i++){
        const vv=-vmax+i*vmax/2;
        ctx.fillText(vv.toFixed(0), pad2.l+i*(w-pad2.l-pad2.r)/4-8, h-pad2.b+12);
        const Rg=i*Rmax/4;
        ctx.fillText(Rg.toFixed(0), pad2.l-28, pad2.t+(1-i/4)*(h-pad2.t-pad2.b)+4);
    }

    const lam = C/(fc*1e9);
    cv=$('c_sim_a'); ({ctx,w,h}=fitCanvas(cv));
    ctx.clearRect(0,0,w,h);
    const pad3={l:40,r:14,t:20,b:30};
    drawAxes(ctx,w,h,pad3,'θ (°)','|Angle-FFT|');
    const d=lam/2;
    const Ngrid=360;
    const aSpec=new Float32Array(Ngrid);
    for(let k=0;k<Ngrid;k++){
        const ang=-90+k*180/Ngrid;
        const angR=ang*Math.PI/180;
        let re=0,im=0;
        targets.forEach(tg=>{
            const thR=tg.th*Math.PI/180;
            for(let n=0;n<Nrx;n++){
                const phObs=2*Math.PI*d*Math.sin(thR)/lam*n;
                const phSt =2*Math.PI*d*Math.sin(angR)/lam*n;
                re += tg.amp*Math.cos(phObs-phSt);
                im += tg.amp*Math.sin(phObs-phSt);
            }
        });
        aSpec[k]=Math.sqrt(re*re+im*im)+noise*Math.random()*Nrx*0.1;
    }
    const amx=Math.max(...aSpec)||1;
    const grd=ctx.createLinearGradient(0,pad3.t,0,h-pad3.b);
    grd.addColorStop(0,'#a78bfa'); grd.addColorStop(1,'#a78bfa00');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.moveTo(pad3.l, h-pad3.b);
    for(let k=0;k<Ngrid;k++){
        const x=pad3.l+k/Ngrid*(w-pad3.l-pad3.r);
        const y=h-pad3.b - (aSpec[k]/amx)*(h-pad3.t-pad3.b)*0.95;
        ctx.lineTo(x,y);
    }
    ctx.lineTo(w-pad3.r, h-pad3.b); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#a78bfa'; ctx.lineWidth=1.4; ctx.beginPath();
    for(let k=0;k<Ngrid;k++){
        const x=pad3.l+k/Ngrid*(w-pad3.l-pad3.r);
        const y=h-pad3.b - (aSpec[k]/amx)*(h-pad3.t-pad3.b)*0.95;
        if(k===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.fillStyle='#8a97c7'; ctx.font='10px sans-serif';
    for(let a=-90;a<=90;a+=30){
        const x=pad3.l+(a+90)/180*(w-pad3.l-pad3.r);
        ctx.fillText(a+'°', x-8, h-pad3.b+12);
    }
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif';
    targets.forEach((tg,i)=>{
        const x=pad3.l+(tg.th+90)/180*(w-pad3.l-pad3.r);
        ctx.fillText('T'+(i+1), x-4, pad3.t+12);
    });
}

['x_fc','x_B','x_Tc','x_Nc','x_Nrx','x_noise'].forEach(id=>$(id).oninput=renderSim);
</script>

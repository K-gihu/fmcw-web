<h2>⑤ 参数设计器：倒推 Chirp & 帧配置</h2>
<p>给定系统约束（ADC 采样率、期望性能）和应用需求（最大距离、速度、分辨率），自动推荐 Chirp 与帧参数。</p>

<div class="grid">
    <div class="card">
        <h3>输入：系统约束</h3>
        <div class="controls">
            <div class="ctrl"><label>载频 f<sub>c</sub> (GHz) <b id="p_fc_v">77</b></label>
                <input type="number" id="p_fc" value="77" step="1"></div>
            <div class="ctrl"><label>ADC 采样率 f<sub>s</sub> (MHz) <b id="p_fs_v">10</b></label>
                <input type="number" id="p_fs" value="10" step="1"></div>
            <div class="ctrl"><label>可用带宽 B<sub>max</sub> (GHz) <b id="p_Bmax_v">4</b></label>
                <input type="number" id="p_Bmax" value="4" step="0.1"></div>
            <div class="ctrl"><label>ADC 样本数 N<sub>ADC</sub> <b id="p_Nadc_v">256</b></label>
                <input type="number" id="p_Nadc" value="256" step="64"></div>
        </div>
        <h3>输入：性能目标</h3>
        <div class="controls">
            <div class="ctrl"><label>最大距离 R<sub>max</sub> (m) <b id="p_Rmax_v">100</b></label>
                <input type="number" id="p_Rmax" value="100" step="10"></div>
            <div class="ctrl"><label>距离分辨率 ΔR (m) <b id="p_dR_v">0.1</b></label>
                <input type="number" id="p_dR" value="0.1" step="0.01"></div>
            <div class="ctrl"><label>最大速度 v<sub>max</sub> (m/s) <b id="p_vmax_v">30</b></label>
                <input type="number" id="p_vmax" value="30" step="5"></div>
            <div class="ctrl"><label>速度分辨率 Δv (m/s) <b id="p_dv_v">0.5</b></label>
                <input type="number" id="p_dv" value="0.5" step="0.1"></div>
        </div>
    </div>

    <div class="card">
        <h3>🎯 推荐参数</h3>
        <div class="kv" id="p_result"></div>

        <h3>校验</h3>
        <div id="p_checks" style="font-size:13px"></div>

        <div class="note" style="margin-top:14px">
            💡 <b>设计顺序</b>：① 由 ΔR 定 B；② 由 R<sub>max</sub> 和 f<sub>s</sub> 定 S 和 T<sub>c</sub>；③ 由 v<sub>max</sub> 定 T<sub>c</sub> 上限；④ 由 Δv 定 N<sub>chirp</sub>。
        </div>
    </div>
</div>

<div class="card" style="margin-top:18px">
    <h3>参数敏感性图</h3>
    <canvas id="c_param_sens" width="1200" height="260"></canvas>
    <div class="legend">
        <i style="background:var(--cyan)"></i>ΔR vs B
        <i style="background:var(--orange)"></i>R<sub>max</sub> vs T<sub>c</sub>
        <i style="background:var(--green)"></i>v<sub>max</sub> vs T<sub>c</sub>
        <i style="background:var(--violet)"></i>Δv vs N<sub>chirp</sub>
    </div>
</div>

<script>
function renderParams(){
    const fc = +$('p_fc').value;
    const fs = +$('p_fs').value;
    const Bmax = +$('p_Bmax').value;
    const Nadc = +$('p_Nadc').value;
    const RmaxReq = +$('p_Rmax').value;
    const dRreq = +$('p_dR').value;
    const vmaxReq = +$('p_vmax').value;
    const dvReq = +$('p_dv').value;
    $('p_fc_v').textContent=fc;
    $('p_fs_v').textContent=fs;
    $('p_Bmax_v').textContent=Bmax;
    $('p_Nadc_v').textContent=Nadc;
    $('p_Rmax_v').textContent=RmaxReq;
    $('p_dR_v').textContent=dRreq;
    $('p_vmax_v').textContent=vmaxReq;
    $('p_dv_v').textContent=dvReq;

    const lam = C/(fc*1e9);
    const B = Math.min(Bmax, C/(2*dRreq*1e9));
    const B_actual = B;
    const Smax = (fs*1e6)*C/(4*RmaxReq);
    const Tc = (B_actual*1e9)/Smax;
    const Tc_us = Tc*1e6;
    const Rmax_actual = (fs*1e6)*C*Tc/(4*B_actual*1e9);
    const Tc_max_vmax = lam/(4*vmaxReq);
    const Tc_us_max = Tc_max_vmax*1e6;
    const vmax_actual = lam/(4*Math.max(Tc,Tc_max_vmax));
    const Nc = Math.ceil(lam/(2*dvReq*Tc));
    const dv_actual = lam/(2*Nc*Tc);
    const Tf = Nc*Tc;

    const out = [
        ['推荐带宽 B', (B_actual).toFixed(3)+' GHz'],
        ['推荐斜率 S', (Smax/1e12).toFixed(2)+' THz/s'],
        ['Chirp 时长 T<sub>c</sub>', Tc_us.toFixed(1)+' μs'],
        ['每帧 Chirp 数 N<sub>chirp</sub>', Nc],
        ['帧时长 T<sub>frame</sub>', (Tf*1000).toFixed(1)+' ms'],
        ['实际 R<sub>max</sub>', Rmax_actual.toFixed(1)+' m'],
        ['实际 ΔR', (C/(2*B_actual*1e9)*100).toFixed(2)+' cm'],
        ['实际 v<sub>max</sub>', vmax_actual.toFixed(2)+' m/s'],
        ['实际 Δv', dv_actual.toFixed(3)+' m/s'],
        ['波长 λ', (lam*1000).toFixed(2)+' mm']
    ];
    $('p_result').innerHTML = out.map(([k,v])=>`<div>${k}</div><b>${v}</b>`).join('');

    const checks = [];
    if(B_actual < C/(2*dRreq*1e9)){
        checks.push({ok:false, t:`❌ 带宽受限：需 ${(C/(2*dRreq*1e9)).toFixed(2)} GHz 才能达到 ΔR=${dRreq} m，但最大只有 ${Bmax} GHz`});
    } else checks.push({ok:true, t:`✅ 距离分辨率达标`});
    if(Tc_us > Tc_us_max){
        checks.push({ok:false, t:`❌ v<sub>max</sub> 冲突：要 vmax≥${vmaxReq} m/s，T<sub>c</sub> 必须 ≤ ${Tc_us_max.toFixed(1)} μs`});
    } else checks.push({ok:true, t:`✅ 最大速度达标`});
    if(Tf > 0.1) checks.push({ok:false, t:`⚠ 帧时长 ${(Tf*1000).toFixed(0)} ms，>100 ms 可能影响实时性`});
    else checks.push({ok:true, t:`✅ 帧时长合理`});
    if(Nc > 512) checks.push({ok:false, t:`⚠ N<sub>chirp</sub>=${Nc} 偏大，DSP 负担重`});
    else checks.push({ok:true, t:`✅ N<sub>chirp</sub> 合理`});
    $('p_checks').innerHTML = checks.map(c=>`<div style="padding:4px 0;color:${c.ok?'#cdd6f4':'#ef4444'}">${c.t}</div>`).join('');

    const {ctx,w,h} = fitCanvas($('c_param_sens'));
    ctx.clearRect(0,0,w,h);
    const pad={l:60,r:20,t:20,b:40};
    const pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
    const panels = [
        {title:'ΔR vs B (GHz)', color:'#22d3ee', fn:B=>C/(2*B*1e9), xrange:[0.5,6], yunit:'m', yscale:v=>v},
        {title:'Rmax vs Tc (μs)', color:'#fb923c', fn:Tc=>(fs*1e6)*C*(Tc*1e-6)/(4*B_actual*1e9), xrange:[10,200], yunit:'m', yscale:v=>v},
        {title:'vmax vs Tc (μs)', color:'#4ade80', fn:Tc=>lam/(4*Tc*1e-6), xrange:[10,200], yunit:'m/s', yscale:v=>v},
        {title:'Δv vs Nchirp', color:'#a78bfa', fn:N=>lam/(2*N*Tc), xrange:[8,256], yunit:'m/s', yscale:v=>v}
    ];
    const pW = (pw-30)/4;
    panels.forEach((p,idx)=>{
        const ox = pad.l + idx*(pW+10);
        const oy = pad.t;
        ctx.strokeStyle='#253163'; ctx.strokeRect(ox,oy,pW,ph);
        ctx.fillStyle='#cdd6f4'; ctx.font='bold 11px sans-serif';
        ctx.fillText(p.title, ox+6, oy+14);
        const N=80;
        const ys=[]; let ymin=Infinity, ymax=-Infinity;
        for(let i=0;i<N;i++){
            const x = p.xrange[0] + i/(N-1)*(p.xrange[1]-p.xrange[0]);
            const y = p.fn(x);
            ys.push(y);
            if(y<ymin) ymin=y; if(y>ymax) ymax=y;
        }
        ctx.strokeStyle=p.color; ctx.lineWidth=1.8; ctx.beginPath();
        for(let i=0;i<N;i++){
            const x = ox + i/(N-1)*pW;
            const y = oy + ph - (ys[i]-ymin)/(ymax-ymin)*ph*0.9 - ph*0.05;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.fillStyle='#8a97c7'; ctx.font='10px sans-serif';
        ctx.fillText(ymax.toFixed(2), ox+2, oy+26);
        ctx.fillText(ymin.toFixed(2), ox+2, oy+ph-4);
        ctx.fillText(p.xrange[0], ox+2, oy+ph+12);
        ctx.fillText(p.xrange[1], ox+pW-24, oy+ph+12);
    });
}

['p_fc','p_fs','p_Bmax','p_Nadc','p_Rmax','p_dR','p_vmax','p_dv'].forEach(id=>$(id).oninput=renderParams);
</script>
